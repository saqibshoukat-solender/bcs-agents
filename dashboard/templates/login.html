<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — BCS Agents</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          boxShadow: { glow: '0 8px 24px -8px rgba(79, 70, 229, 0.45)' },
        }
      }
    }
  </script>
  <style>
    html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
  </style>
</head>
<body class="h-full bg-slate-50 flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <div class="flex flex-col items-center mb-6">
      <div class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-violet-600 rounded-2xl flex items-center justify-center text-white font-bold text-lg shadow-glow mb-3">B</div>
      <h1 class="text-slate-800 font-semibold text-lg tracking-tight">BCS Agents</h1>
      <p class="text-slate-500 text-sm">Sign in to the admin dashboard</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm ring-1 ring-slate-900/5 p-6">
      {% if error %}
      <div class="mb-4 px-3 py-2.5 bg-red-50 ring-1 ring-red-100 rounded-xl text-sm text-red-700 font-medium">
        {{ error }}
      </div>
      {% endif %}
      <form method="post" action="/login" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">Email</label>
          <input type="email" name="email" required autofocus placeholder="you@bcs.net"
            class="w-full px-3 py-2.5 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white"/>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">Password</label>
          <input type="password" name="password" required placeholder="••••••••"
            class="w-full px-3 py-2.5 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white"/>
        </div>
        <button type="submit"
          class="w-full px-4 py-2.5 text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 rounded-xl shadow-sm hover:shadow-md transition-all duration-150">
          Sign In
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-slate-400 mt-5">Blue Collar Scholars — Admin Dashboard</p>
  </div>

</body>
</html>
